      } },
    };
  </script>
  <link rel="stylesheet" href="console.css" />
  <link rel="stylesheet" href="nexus.css" />
  <script src="theme.js"></script>
  <script>
    (function () {
      var saved = 'command';
      try { saved = localStorage.getItem('nexus.style') || 'command'; } catch (e) {}
      window.OPS_THEME.apply(saved);
